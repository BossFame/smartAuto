<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Automation</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <section class="topBar">
      <div class="top-Bar">
        <h2 class="auto1">Smart <br/>Home </h2>
        <h2 class="auto2">Automationsss</h2>
      </div>
        <!-- <p>Control Your Home Smartly</p> -->
    </section>
    <section class="hero">
      <div class="navbar">
        <div class="connected">
          <img src="images/image1.png" alt="battery">
          <p>Connected</p>
        </div>
        <div class="mode">
          <img src="images/image2.png" alt="wifi">
          <img src="images/image3.png" alt="settings" class="settings">
        </div>

      </div>

      <div class="hero-1">
        <div class="grid" id="grid"></div>
      </div>

      <div class="global-status">
        <p id="globalStatus" class="status">System is ready</p>
      </div>

      <div class="summary-box">
    <h3>Device Summary</h3>
    <div id="summaryList"></div>
</div>
      
      <button class="voice" id="voiceBtn">
        <img src="images/mic.png" alt="microphone" class="mic">
        <span class="wave"></span>
      </button>
    </section>
  </div>

  <script src="script.js"></script>
  
</body>
</html>
